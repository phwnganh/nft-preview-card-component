<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <title>Frontend Mentor | NFT preview card component</title>

</head>
<body class="page">
  <div class="card">
    <div class="card__image">
      <img src="images/image-equilibrium.jpg" alt="Equilibrium"/>
    </div>
    <div class="card-body">
      <div class="card-body__content">
        <h1 class="card-body__title">Equilibrium #3429</h1>
        <p class="card-body__description">Our Equilibrium collection promotes balance and calm.</p>
      </div>
      <div class="card-detailed">
        <div class="card-detailed__statistic">
          <div class="card-statistic__icon">
            <img src="images/icon-ethereum.svg" alt="Ethereum-icon"/>
          </div>
          <span class="card-detailed__number">0.041 ETH</span>
        </div>

        <div class="card-detailed__remaining">
          <div class="card-remaining__icon">
            <img src="images/icon-clock.svg" alt="Clock-icon"/>
          </div>
          <span class="card-remaining__number">3 days left</span>
        </div>
      </div>
    </div>
    <hr/>
    <div class="card-author">
      <div class="card-author__avatar">
        <img src="images/image-avatar.png" alt="Avatar"/>
      </div>
      <p class="card-author__name">
        Creation of <span>Jules Wyvern</span>
      </p>
    </div>
  </div>



</body>
</html>
